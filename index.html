<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>芸能労災保険 料金シミュレーション</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- ReactとBabel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div style="text-align:center; padding: 100px 20px; font-family: sans-serif;">
      <h2 style="color: #2563eb; margin-bottom: 20px;">シミュレーション画面を準備中です...</h2>
      <p style="color: #666;">※いつまでもこの画面が変わらない場合、キーボードの <strong>Ctrl + F5</strong>（Macは <strong>Command + Shift + R</strong>）を押してページを更新してください。</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState } = React;

    // エクセルから抽出した料金データ（※月額合計金額は最初のエクセルのままです）
    const PLAN_DATA = [
      { daily: 25000, annual: 27375, monthlyPremium: 2281.25, baseFee: 500, advanceFee: 218.75, monthlyTotal: 3000 },
      { daily: 24000, annual: 26280, monthlyPremium: 2190, baseFee: 500, advanceFee: 210, monthlyTotal: 2900 },
      { daily: 22000, annual: 24090, monthlyPremium: 2007.5, baseFee: 500, advanceFee: 292.5, monthlyTotal: 2800 },
      { daily: 20000, annual: 21900, monthlyPremium: 1825, baseFee: 500, advanceFee: 375, monthlyTotal: 2700 },
      { daily: 18000, annual: 19710, monthlyPremium: 1642.5, baseFee: 500, advanceFee: 157.5, monthlyTotal: 2300 },
      { daily: 16000, annual: 17520, monthlyPremium: 1460, baseFee: 500, advanceFee: 140, monthlyTotal: 2100 },
      { daily: 14000, annual: 15330, monthlyPremium: 1277.5, baseFee: 500, advanceFee: 122.5, monthlyTotal: 1900 },
      { daily: 12000, annual: 13140, monthlyPremium: 1095, baseFee: 500, advanceFee: 105, monthlyTotal: 1700 },
      { daily: 10000, annual: 10950, monthlyPremium: 912.5, baseFee: 500, advanceFee: 87.5, monthlyTotal: 1500 },
      { daily: 8000, annual: 8760, monthlyPremium: 730, baseFee: 500, advanceFee: 170, monthlyTotal: 1400 },
      { daily: 6000, annual: 6570, monthlyPremium: 547.5, baseFee: 500, advanceFee: 152.5, monthlyTotal: 1200 },
      { daily: 5000, annual: 5475, monthlyPremium: 456.25, baseFee: 500, advanceFee: 143.75, monthlyTotal: 1100 },
      { daily: 4000, annual: 4380, monthlyPremium: 365, baseFee: 500, advanceFee: 135, monthlyTotal: 1000 },
      { daily: 3500, annual: 3832.5, monthlyPremium: 319.375, baseFee: 500, advanceFee: 180.625, monthlyTotal: 1000 },
    ];

    // アイコン群
    const CalculatorIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8 text-blue-600"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>;
    const CalendarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-blue-600"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const CreditCardIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-orange-400"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>;
    const InfoIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
    const CheckCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><circle cx="12" cy="12" r="10"></circle><polyline points="9 11 12 14 22 4"></polyline></svg>;

    function App() {
      const [selectedDaily, setSelectedDaily] = useState(10000);
      const [contractPeriod, setContractPeriod] = useState(12);

      const currentPlan = PLAN_DATA.find((plan) => plan.daily === selectedDaily) || PLAN_DATA[8];

      // 新しいエクセル（正規一覧）に基づいた入会金ルール
      const getAdmissionFee = (months) => {
        if (months >= 1 && months <= 3) return 3000;
        if (months >= 4 && months <= 6) return 2000;
        return 1000; // 7ヶ月以上は1000円
      };

      const admissionFee = getAdmissionFee(contractPeriod);
      
      // === 【総額】の計算（エクセル通りのシンプルな計算式） ===
      // 一括払いの総額 ＝ (月額合計 × 契約月数) ＋ 入会金
      const totalContractAmount = (currentPlan.monthlyTotal * contractPeriod) + admissionFee;

      // 月払いの初回お支払い額 ＝ 月額合計 ＋ 入会金
      const firstMonthTotal = currentPlan.monthlyTotal + admissionFee;

      const formatCurrency = (amount) => {
        return new Intl.NumberFormat('ja-JP').format(Math.floor(amount)) + '円';
      };

      return (
        <div className="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8 font-sans text-gray-800">
          <div className="max-w-4xl mx-auto">
            
            <div className="text-center mb-10">
              <h1 className="text-3xl font-bold text-blue-900 mb-2 flex items-center justify-center gap-2">
                <CalculatorIcon />
                芸能労災保険 料金シミュレーション
              </h1>
              <p className="text-gray-600">
                ご希望の給付基礎日額とご契約期間を選択すると、すぐにお見積りを確認できます。
              </p>
            </div>

            <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
              <div className="grid grid-cols-1 md:grid-cols-2">
                
                {/* 左側：入力フォーム */}
                <div className="p-8 bg-blue-50/50">
                  <h2 className="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <CalendarIcon />
                    条件を選択してください
                  </h2>

                  <div className="mb-8">
                    <label className="block text-sm font-bold text-gray-700 mb-3">
                      1. 給付基礎日額（休業補償額）
                    </label>
                    <div className="relative">
                      <select
                        value={selectedDaily}
                        onChange={(e) => setSelectedDaily(Number(e.target.value))}
                        className="block w-full pl-4 pr-10 py-3 text-base border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-xl bg-white shadow-sm border appearance-none font-medium"
                      >
                        {PLAN_DATA.map((plan) => (
                          <option key={plan.daily} value={plan.daily}>
                            {formatCurrency(plan.daily)}
                          </option>
                        ))}
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <svg className="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                      </div>
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-3">
                      2. ご契約予定期間
                    </label>
                    <div className="relative mb-2">
                      <select
                        value={contractPeriod}
                        onChange={(e) => setContractPeriod(Number(e.target.value))}
                        className="block w-full pl-4 pr-10 py-3 text-base border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-xl bg-white shadow-sm border appearance-none font-medium"
                      >
                        {[...Array(36)].map((_, i) => {
                          const month = i + 1;
                          let label = `${month}ヶ月`;
                          if (month % 12 === 0) label += `（${month / 12}年）`;
                          if (month >= 12) label += ' ※自動更新';
                          return <option key={month} value={month}>{label}</option>;
                        })}
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <svg className="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                      </div>
                    </div>
                    <p className="text-xs text-gray-500">※最大36ヶ月まで選択可能です。12ヶ月以上のご契約は自動更新となります。</p>
                  </div>
                </div>

                {/* 右側：お見積り結果 */}
                <div className="p-8 bg-gray-900 text-white flex flex-col justify-center">
                  <h2 className="text-xl font-bold text-gray-100 mb-6 flex items-center gap-2">
                    <CreditCardIcon />
                    お見積り結果
                  </h2>

                  {/* === 一括払いエリア === */}
                  <div className="bg-gradient-to-br from-orange-500 to-red-600 rounded-2xl p-6 mb-6 shadow-lg border border-orange-400 relative overflow-hidden">
                    <div className="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-xs font-bold px-3 py-1 rounded-bl-lg">
                      一括お支払いの場合
                    </div>
                    <p className="text-sm font-bold text-orange-100 mb-2">{contractPeriod}ヶ月のご契約総額</p>
                    <div className="flex items-baseline gap-2 mb-3">
                      <span className="text-5xl font-extrabold tracking-tight text-white">
                        {formatCurrency(totalContractAmount)}
                      </span>
                    </div>
                    
                    {/* 一括払いの内訳詳細（シンプル化） */}
                    <div className="bg-black/20 rounded-lg p-3 text-sm text-orange-50 space-y-1.5">
                      <p className="text-xs text-orange-200 font-bold mb-1 border-b border-orange-400/30 pb-1">ご契約総額の内訳</p>
                      <div className="flex justify-between">
                        <span>月額合計（{formatCurrency(currentPlan.monthlyTotal)}）× {contractPeriod}ヶ月</span>
                        <span className="font-bold">{formatCurrency(currentPlan.monthlyTotal * contractPeriod)}</span>
                      </div>
                      <div className="flex justify-between">
                        <span>入会金</span>
                        <span className="font-bold">{formatCurrency(admissionFee)}</span>
                      </div>
                    </div>
                  </div>

                  {/* === 月払いエリア === */}
                  <div className="bg-gray-800 rounded-xl p-6 mb-8 border border-gray-700 relative">
                    <div className="absolute -top-3 left-4 bg-gray-700 text-gray-300 text-xs font-bold px-2 py-1 rounded">
                      月払いをご希望の場合
                    </div>
                    <div className="mt-2 flex justify-between items-center border-b border-gray-600 pb-3 mb-3">
                      <p className="text-sm font-bold text-gray-400">初回のお支払い額</p>
                      <span className="text-2xl font-bold text-blue-400 tracking-tight">
                        {formatCurrency(firstMonthTotal)}
                      </span>
                    </div>
                    <div className="flex justify-between items-center">
                      <p className="text-sm font-bold text-gray-400">2ヶ月目以降（毎月）</p>
                      <span className="text-xl font-bold text-white tracking-tight">
                        {formatCurrency(currentPlan.monthlyTotal)}
                      </span>
                    </div>
                  </div>

                  {/* 1ヶ月あたりの内訳詳細 */}
                  <div>
                    <h3 className="text-sm font-bold text-gray-400 border-b border-gray-700 pb-2 mb-4 flex items-center gap-1">
                      <InfoIcon /> 1ヶ月あたりの内訳詳細
                    </h3>
                    <ul className="space-y-3 text-sm">
                      <li className="flex justify-between items-center text-gray-300">
                        <span>労災保険料（月割）</span>
                        <span className="font-medium">{formatCurrency(currentPlan.monthlyPremium)}</span>
                      </li>
                      <li className="flex justify-between items-center text-gray-300">
                        <span>月額手数料</span>
                        <span className="font-medium">{formatCurrency(currentPlan.baseFee)}</span>
                      </li>
                      <li className="flex justify-between items-center text-gray-300">
                        <span>立替月額手数料</span>
                        <span className="font-medium">{formatCurrency(currentPlan.advanceFee)}</span>
                      </li>
                    </ul>
                  </div>

                  {/* 申し込みボタン */}
                  <div className="mt-8">
                    <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2">
                      <CheckCircleIcon />
                      お申し込み画面へ進む
                    </button>
                  </div>

                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
